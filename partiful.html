<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Partiful Warlord</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

        <style>
            :root {
                --bg: #0b0a0f;
                --panel: #16141d;
                --ink: #f4f1ff;
                --muted: #a39fb5;
                --line: #272336;
                --going: #57e08a;
                --invited: #8ea2ff;
            }
            * { box-sizing: border-box; }
            .staticrypt-html, .staticrypt-body { height: 100%; }
            .staticrypt-body {
                margin: 0;
                color: var(--ink);
                font-family: "Inter", system-ui, sans-serif;
                -webkit-font-smoothing: antialiased;
                background:
                    radial-gradient(1200px 600px at 12% -10%, rgba(142,162,255,.14), transparent 60%),
                    radial-gradient(900px 500px at 100% 0%, rgba(255,124,170,.12), transparent 55%),
                    var(--bg);
            }
            .staticrypt-content { height: 100%; }
            .staticrypt-page {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }
            .staticrypt-form {
                width: 100%;
                max-width: 400px;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 22px;
                padding: 40px 34px;
                text-align: center;
                box-shadow: 0 30px 80px -24px rgba(0, 0, 0, 0.9);
            }
            .staticrypt-title {
                font-family: "Sora", sans-serif;
                font-weight: 800;
                font-size: 30px;
                letter-spacing: -0.5px;
                margin: 0;
                background: linear-gradient(92deg, #fff, #b9c4ff);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .staticrypt-instructions p:not(.staticrypt-title) {
                color: var(--muted);
                font-size: 14px;
                margin: 10px 0 0;
            }
            .staticrypt-hr { border: 0; border-top: 1px solid var(--line); margin: 26px 0; }
            .staticrypt-password-container {
                position: relative;
                background: #0f0e15;
                border: 1px solid var(--line);
                border-radius: 12px;
                margin: 0 0 16px;
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                outline: 0;
                width: 100%;
                color: var(--ink);
                font-size: 15px;
                padding: 15px 44px 15px 16px;
            }
            .staticrypt-toggle-password-visibility {
                cursor: pointer; height: 20px; width: 20px; opacity: 0.55;
                padding: 14px; position: absolute; right: 0; top: 50%;
                transform: translateY(-50%); filter: invert(1);
            }
            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%; border: 0; cursor: pointer; border-radius: 12px;
                padding: 15px; color: #0b0a0f; font-family: "Sora", sans-serif;
                font-weight: 700; font-size: 15px; letter-spacing: 0.2px;
                background: linear-gradient(135deg, var(--invited), #c79bff);
                transition: transform 0.15s, filter 0.15s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover { transform: translateY(-2px); filter: brightness(1.05); }
            label.staticrypt-remember {
                display: flex; align-items: center; gap: 10px; justify-content: center;
                color: var(--muted); font-size: 13px; margin-bottom: 16px;
            }
            .staticrypt-remember input[type="checkbox"] { transform: scale(1.3); }
            .hidden { display: none !important; }
            .staticrypt-spinner-container { height: 100%; display: flex; align-items: center; justify-content: center; }
            .staticrypt-spinner {
                display: inline-block; width: 2rem; height: 2rem;
                border: 0.25em solid var(--line); border-right-color: var(--invited);
                border-radius: 50%; animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }
        </style>
    </head>
